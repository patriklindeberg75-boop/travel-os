<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Balkans Overland South — Travel Dossier</title>
<meta name="description" content="Balkans overland dossier — Budapest to Sofia, heat-aware, ultra-budget. A menu, not a schedule.">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4efe4">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16140f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Balkans">
<meta name="application-name" content="Balkans">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#f4efe4; --surface:#fffdf8; --surface-2:#ece5d6;
  --ink:#211d16; --muted:#6f685b; --faint:#9a9182;
  --line:rgba(33,29,22,.12); --line-2:rgba(33,29,22,.22);
  --accent:#0f6e56; --accent-bg:#e2efe9; --accent-ink:#0a4f3e;
  --heat:#a8620f; --heat-bg:#f7e9d2; --heat-ink:#7a4709;
  --danger:#8f2a2a; --danger-bg:#f6e6e2; --danger-ink:#6e1f1f;
  --star:#c98a12;
  --fr:#5a4ba8; --fr-bg:#eae7f6; --fr-ink:#3f3380;
  --serif:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:10px; --r-lg:14px;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#16140f; --surface:#211e17; --surface-2:#2b2820;
    --ink:#ece6d8; --muted:#a59d8c; --faint:#7b7464;
    --line:rgba(236,230,216,.12); --line-2:rgba(236,230,216,.22);
    --accent:#4cbf9c; --accent-bg:#13332a; --accent-ink:#8fe0c8;
    --heat:#e0a14e; --heat-bg:#3a2a12; --heat-ink:#f0c98a;
    --danger:#e08a82; --danger-bg:#3a201d; --danger-ink:#f2b3ac;
    --star:#e0a93a;
    --fr:#9b8fe0; --fr-bg:#26203f; --fr-ink:#c3b8f2;
  }
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:740px;margin:0 auto;padding:0 18px 80px}
.ic{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.14em;flex:none}

/* masthead */
.mast{padding:34px 0 18px}
.kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.mast h1{font-family:var(--serif);font-weight:400;font-size:34px;line-height:1.1;margin:8px 0 6px}
.mast .sub{color:var(--muted);font-size:15px;max-width:60ch}
.mast .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;padding:4px 10px;border-radius:999px;background:var(--surface-2);color:var(--muted)}
.pill.warn{background:var(--heat-bg);color:var(--heat-ink)}

/* menu-not-schedule banner */
.menu-note{display:flex;gap:9px;align-items:flex-start;background:var(--accent-bg);color:var(--accent-ink);border-radius:var(--r-lg);padding:12px 14px;margin:18px 0 4px;font-size:13.5px;line-height:1.5}
.menu-note .ic{margin-top:.18em;color:var(--accent);font-size:17px}
.menu-note b{font-weight:600}

/* sticky nav */
nav.stops{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);margin:0 -18px 4px;padding:8px 18px}
nav.stops .row{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
nav.stops .row::-webkit-scrollbar{display:none}
nav.stops a{flex:none;font-size:13.5px;color:var(--muted);text-decoration:none;padding:6px 11px;border-radius:999px;white-space:nowrap;transition:background .15s,color .15s}
nav.stops a:hover{background:var(--surface-2)}
nav.stops a.active{background:var(--ink);color:var(--bg);font-weight:500}

.toolbar{display:flex;gap:8px;justify-content:flex-end;padding:10px 0 2px}
.toolbar button{font-family:var(--sans);font-size:12.5px;color:var(--muted);background:transparent;border:1px solid var(--line-2);border-radius:999px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.toolbar button:hover{background:var(--surface-2);color:var(--ink)}

/* stop */
.stop{scroll-margin-top:58px;padding-top:26px;opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
@keyframes rise{to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.stop{animation:none;opacity:1;transform:none}}
.stop-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-top:2px solid var(--ink);padding-top:14px}
.stop-head h2{font-family:var(--serif);font-weight:400;font-size:27px;margin:0}
.stop-head .when{color:var(--muted);font-size:14px}
.stop-head .heat{margin-left:auto;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px}
.heat.flag{background:var(--heat-bg);color:var(--heat-ink)}
.heat.cool{background:var(--accent-bg);color:var(--accent-ink)}

/* summary card */
.summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;margin:14px 0 18px}
.chips{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.metric{background:var(--surface-2);border-radius:var(--r);padding:9px 12px}
.metric .lab{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.05em}
.metric .val{font-size:15px;font-weight:500;margin-top:2px}
.metric.heat .lab,.metric.heat .val{color:var(--heat-ink)}
.start{display:flex;gap:9px;align-items:flex-start;background:var(--accent-bg);color:var(--accent-ink);border-radius:var(--r);padding:10px 12px;font-size:13.5px;line-height:1.5}
.start b{font-weight:600}
.start .ic{margin-top:.18em;color:var(--accent)}
.transit{display:flex;gap:8px;align-items:flex-start;color:var(--muted);font-size:12.5px;margin-top:11px;line-height:1.5}
.transit .ic{margin-top:.15em}

/* sections */
details{border-top:1px solid var(--line)}
details:last-of-type{border-bottom:1px solid var(--line)}
summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:14px 2px;font-size:16px;font-weight:500;user-select:none}
summary::-webkit-details-marker{display:none}
summary .ic.lead{color:var(--accent);font-size:18px}
summary .cnt{color:var(--faint);font-weight:400;font-size:13.5px}
summary .chev{margin-left:auto;color:var(--faint);transition:transform .2s}
details[open] summary .chev{transform:rotate(180deg)}
.sec-body{padding:0 0 14px}
.subhead{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:6px 0 9px}

/* place card */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 15px;margin-bottom:9px}
.card .top{display:flex;align-items:baseline;gap:10px;margin-bottom:5px}
.card .nm{font-weight:500;font-size:15.5px;flex:1}
.stars{flex:none;letter-spacing:1px;font-size:12px;white-space:nowrap}
.stars .ic{color:var(--star)}
.stars .ic.off{color:var(--line-2)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted);background:var(--surface-2);border-radius:999px;padding:2px 9px}
.tag.cool{background:var(--accent-bg);color:var(--accent-ink)}
.tag.fr{background:var(--fr-bg);color:var(--fr-ink)}
.hook{font-size:14px;line-height:1.5;margin:0 0 7px}
.facts{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:12px;color:var(--faint)}
.facts span{display:inline-flex;align-items:center;gap:5px}

/* tappable place name + location → Google Maps */
a.nm{color:var(--accent-ink);text-decoration:none}
a.nm .ic.pin{font-size:12px;color:var(--accent);margin-left:6px;opacity:.75;vertical-align:baseline}
a.nm:active{opacity:.6}
.loc{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);margin:-1px 0 7px;min-height:30px}
a.loc{color:var(--accent-ink);text-decoration:none}
a.loc .ic{color:var(--accent);font-size:13px}
a.loc:active{opacity:.6}

/* avoid */
.card.avoid{background:var(--danger-bg);border-color:var(--danger);}
.card.avoid .top{align-items:center}
.card.avoid .nm{color:var(--danger-ink)}
.card.avoid .hook{color:var(--danger-ink)}
.card.avoid .where{font-size:12px;color:var(--danger);margin:-2px 0 6px}
.card.avoid a.nm{color:var(--danger-ink)}
.card.avoid a.nm .ic.pin{color:var(--danger)}
.card.avoid a.loc{color:var(--danger-ink)}
.card.avoid a.loc .ic{color:var(--danger)}
.badge-avoid{flex:none;font-size:10.5px;font-weight:600;letter-spacing:.08em;color:var(--danger-ink);background:var(--surface);border-radius:999px;padding:2px 9px;display:inline-flex;align-items:center;gap:4px}

/* prose blocks */
.verdict{font-size:14.5px;line-height:1.55;margin:0 0 9px}
.verdict b{font-weight:600;color:var(--accent-ink)}
.costline{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);background:var(--surface-2);border-radius:999px;padding:3px 11px;margin-bottom:10px}
.note{font-size:13px;line-height:1.55;color:var(--muted);font-style:italic;border-left:2px solid var(--line-2);padding:2px 0 2px 12px;margin:8px 0 0}
.stay-pick{font-size:14px;line-height:1.55;margin:0 0 12px}
.stay-pick .label{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:2px}
.hood{font-size:13.5px;line-height:1.5;margin:0 0 8px;color:var(--muted)}
.hood b{color:var(--ink);font-weight:500}
.hood .base{color:var(--accent);font-weight:600;font-size:11px;letter-spacing:.05em}

/* transport */
.transport-sec{margin-top:34px;border-top:2px solid var(--ink);padding-top:16px}
.transport-sec h2{font-family:var(--serif);font-weight:400;font-size:23px;margin:0 0 4px}
.transport-sec .lede{color:var(--muted);font-size:13.5px;margin:0 0 14px}
.leg{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.leg .ic{color:var(--accent);font-size:18px;margin-top:2px}
.leg .body{flex:1}
.leg .ttl{font-weight:500;font-size:14.5px}
.leg .spec{font-size:12.5px;color:var(--faint);margin:1px 0 4px}
.leg .ds{font-size:13px;color:var(--muted);line-height:1.5}
.leg.hard .ic{color:var(--heat)}
.leg .warn{color:var(--danger-ink);font-style:normal}

footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--faint);line-height:1.6}

/* legend */
.legend summary{font-size:13.5px;color:var(--muted);font-weight:400;padding:12px 2px}
.legend .sec-body{font-size:13px;color:var(--muted);line-height:1.7}
.legend .row{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.legend .k{flex:none;width:84px;color:var(--ink)}

/* ===== V2 interactive layer (want/done · filters · section memory · mobile hygiene) ===== */

/* #4 — safe-area insets (notch / home indicator) */
.wrap{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));padding-bottom:max(80px,calc(env(safe-area-inset-bottom) + 48px))}
nav.stops{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right))}
/* #4 — tap-target hygiene on the persistent controls */
.toolbar button{min-height:38px}
nav.stops a{min-height:36px;display:inline-flex;align-items:center}

/* #7 — masthead spacing on small viewports */
@media (max-width:400px){
  .mast{padding:24px 0 14px}
  .mast h1{font-size:28px}
  .mast .sub{font-size:14px}
  .mast .meta{gap:6px;margin-top:13px}
  .pill{font-size:12px;padding:4px 9px}
}

/* #1 — want / done place toggles */
.card .acts{display:flex;gap:6px;margin-top:10px}
.act{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s,border-color .15s}
.act .ic{font-size:15px}
.act:active{opacity:.6}
.act.want[aria-pressed="true"]{background:var(--accent-bg);color:var(--accent-ink);border-color:var(--accent)}
.act.done[aria-pressed="true"]{background:var(--surface-2);color:var(--faint);border-color:var(--line-2)}
.card.is-want{box-shadow:inset 3px 0 0 var(--accent)}
.card.is-done{opacity:.6}
.card.is-done .hook,.card.is-done .facts{color:var(--faint)}

/* #2 — tag / tier filter bar */
.filterbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:11px 0 5px}
.filterbar[hidden]{display:none}
.fgroup{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.fsep{width:1px;align-self:stretch;min-height:22px;background:var(--line);margin:0 3px}
.flabel{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600}
.chip{font-family:var(--sans);font-size:12px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:6px 11px;min-height:34px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s,border-color .15s}
.chip .ic{font-size:13px}
.chip[aria-pressed="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip.tier[aria-pressed="true"]{background:var(--star);color:#211d16;border-color:var(--star)}
.fclear{font-family:var(--sans);font-size:12px;color:var(--muted);background:transparent;border:none;text-decoration:underline;cursor:pointer;padding:6px;min-height:34px}
.toolbar #filterToggle{margin-right:auto}
.toolbar #filterToggle[aria-pressed="true"]{background:var(--surface-2);color:var(--ink);border-color:var(--line-2)}
/* filtered-out cards + emptied sections */
.card.filtered{display:none}
.view details.empty{display:none}

/* ===== v3 routed shell (top nav · per-stop views · overview) ===== */
main#app{display:block}
.view{max-width:740px;margin:0 auto;padding:10px max(18px,env(safe-area-inset-left)) calc(env(safe-area-inset-bottom) + 64px)}
.view[hidden]{display:none}
.view.active{animation:rise .32s ease}
.stop{padding-top:6px}

/* top nav bar (every route) */
.topnav{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
.tnrow{display:flex;align-items:center;gap:8px;max-width:740px;margin:0 auto;padding:8px max(14px,env(safe-area-inset-left)) 8px max(14px,env(safe-area-inset-left))}
.tn-title{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink);text-decoration:none;flex:none}
.tn-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:flex-end}
.tn-tabs::-webkit-scrollbar{display:none}
.tn-tab{flex:none;font-size:13px;color:var(--muted);text-decoration:none;padding:7px 12px;border-radius:999px;white-space:nowrap;min-height:38px;display:inline-flex;align-items:center;transition:background .15s,color .15s}
.tn-tab:hover{background:var(--surface-2)}
.tn-tab.active{background:var(--ink);color:var(--bg);font-weight:500}
.tn-more{flex:none;background:transparent;border:1px solid var(--line-2);border-radius:999px;color:var(--muted);min-height:38px;min-width:42px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.tn-more[aria-expanded="true"]{background:var(--surface-2);color:var(--ink)}
.tn-more .ic{transition:transform .2s}
.tn-more[aria-expanded="true"] .ic{transform:rotate(180deg)}
.tn-menu{max-width:740px;margin:0 auto;padding:4px max(14px,env(safe-area-inset-left)) 10px;display:flex;flex-direction:column;gap:4px}
.tn-menu[hidden]{display:none}
.tn-menu a{padding:11px 13px;border-radius:var(--r);color:var(--ink);text-decoration:none;font-size:14.5px;background:var(--surface-2);display:flex;align-items:center;gap:9px}
.tn-menu a .ic{color:var(--accent);font-size:17px}

/* per-stop sub-bar (filters / expand) — only on stop views */
.subbar{max-width:740px;margin:0 auto;padding:0 max(18px,env(safe-area-inset-left))}
.subbar[hidden]{display:none}

/* offline indicator */
.off-ind{display:inline-block;font-size:12px;font-weight:600;color:var(--accent-ink);background:var(--accent-bg);border-radius:999px;padding:3px 11px;margin-bottom:8px}
.off-ind[hidden]{display:none}

/* overview view */
.ov-stops{display:flex;flex-direction:column;gap:8px;margin:18px 0 6px}
.ov-stop{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 15px;text-decoration:none;color:var(--ink)}
.ov-stop:active{opacity:.6}
.ov-nm{font-family:var(--serif);font-size:18px;flex:none}
.ov-when{font-size:12.5px;color:var(--muted);flex:1;text-align:left}
.ov-heat{flex:none;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.ov-heat.flag{background:var(--heat-bg);color:var(--heat-ink)}
.ov-heat.cool{background:var(--accent-bg);color:var(--accent-ink)}
.ov-links{display:flex;flex-direction:column;gap:6px;margin:14px 0 4px}
.ov-links a{display:inline-flex;align-items:center;gap:9px;color:var(--accent-ink);text-decoration:none;font-size:14.5px;padding:11px 13px;background:var(--surface-2);border-radius:var(--r)}
.ov-links a .ic{color:var(--accent);font-size:17px}
.legend.about{margin-top:14px}

/* ===== v3 Tier 2 (skip + fold · modes · area chip · tooltips · time) ===== */
/* third action: skip */
.act.skip[aria-pressed="true"]{background:var(--danger-bg);color:var(--danger-ink);border-color:var(--danger)}
/* fold done/skip cards to a one-line row (sink to bottom handled by reflow in JS) */
.card.is-done,.card.is-skip{opacity:.55;padding:9px 14px;cursor:pointer}
.card.is-done .stars,.card.is-skip .stars,
.card.is-done .tags,.card.is-skip .tags,
.card.is-done .hook,.card.is-skip .hook,
.card.is-done .facts,.card.is-skip .facts,
.card.is-done .loc,.card.is-skip .loc,
.card.is-done .acts,.card.is-skip .acts{display:none}
.card.peek{opacity:1;cursor:default}
.card.peek .stars,.card.peek .tags,.card.peek .hook,.card.peek .facts,.card.peek .loc,.card.peek .acts{display:revert}
.state-ic{display:none;flex:none;font-size:16px;margin-right:4px;vertical-align:-.16em}
.card.is-done .state-ic{display:inline-block;color:var(--faint)}
.card.is-skip .state-ic{display:inline-block;color:var(--danger-ink)}
.card.peek .state-ic{display:none}
/* area chip (U-6, derived from existing neighborhood) */
.areachip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--faint);background:transparent;border:1px solid var(--line);border-radius:999px;padding:1px 8px}
.card.is-done .areachip,.card.is-skip .areachip{display:none}
.card.peek .areachip{display:inline-flex}
/* badge self-labeling tooltip (U-7) */
.has-tip{cursor:help}
.tags,.stars{position:relative}
.tip-pop{position:absolute;left:0;top:calc(100% + 5px);z-index:8;background:var(--ink);color:var(--bg);font-size:11.5px;line-height:1.4;padding:7px 10px;border-radius:8px;max-width:220px;box-shadow:0 6px 18px rgba(0,0,0,.28);font-weight:400}
/* mode chips */
.modebar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 0 4px}
.modebar::-webkit-scrollbar{display:none}
.modechip{flex:none;font-family:var(--sans);font-size:12.5px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;min-height:38px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.modechip .ic{font-size:14px}
.modechip[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent)}
.modechip.heat[aria-pressed="true"]{background:var(--heat);border-color:var(--heat)}
.view details.mode-hidden{display:none}

function icon(id){return '<svg class="ic"><use href="#'+id+'"/></svg>';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function kebab(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}

// self-labeling badge tooltips (U-7) — tap a badge to see what it means.
const TIP={
  cool:'Heat-relief — shade, water or altitude.',
  fr:'A friend’s tip — screened in, kept distinct from the author’s own picks.',
  t3:'Top pick — go out of your way.', t2:'Recommended.', t1:'Worth it if nearby.',
  avoid:'Tourist trap — red cards are things to skip, not do.',
  pt:'Price tier for this trip: € under ~€5 full meal · €€ ~€5–10 · €€€ over €10 (splurge by this trip’s standard).'
};

/* ===== v4 taxonomy (§11.1–11.4) ======================================== */
const CATS={
  sights:{l:'Sights & culture',s:'Sights',i:'i-culture',grp:'acts'},
  nature:{l:'Nature & day trips',s:'Nature',i:'i-mountain',grp:'acts'},
  walks:{l:'Walks & neighbourhoods',s:'Walks',i:'i-view',grp:'acts'},
  night:{l:'Evening & nightlife',s:'Evening',i:'i-music',grp:'acts'},
  rest:{l:'Restaurants',s:'Restaurants',i:'i-eat',grp:'food'},
  street:{l:'Street & quick eats',s:'Street eats',i:'i-basket',grp:'food'},
  cafes:{l:'Cafés & sweets',s:'Cafés',i:'i-coffee',grp:'food'},
  work:{l:'Work cafés',s:'Work cafés',i:'i-coffee',grp:'work'}
};
const ACT_ORDER=['sights','nature','walks','night'];
const FOOD_ORDER=['rest','street','cafes'];
function allCards(s){return [...(s.do||[]),...(s.eat||[])];}
function inCat(p,k){return p.cat===k||(p.also||[]).indexOf(k)>=0;}
function slugOf(p,s){return p.id&&p.id.indexOf(s.id+'-')===0?p.id.slice(s.id.length+1):kebab(p.nm);}
// 11.1 fold rule: a sub-type with <2 items folds into the next sibling (else previous);
// a merged group of 3+ sub-types gets the generic label; a lone group shows no label
// unless it is a single pure sub-type (then the sub-type name still informs).
function foldGroups(order,s,fallback){
  let groups=order.map(k=>({keys:[k],items:allCards(s).filter(p=>inCat(p,k))})).filter(g=>g.items.length);
  let guard=0;
  while(groups.length>1&&guard++<20){
    const i=groups.findIndex(g=>g.items.length<2);
    if(i<0)break;
    const into=i<groups.length-1?groups[i+1]:groups[i-1];
    if(i<groups.length-1){into.keys=groups[i].keys.concat(into.keys);into.items=groups[i].items.concat(into.items);}
    else{into.keys=into.keys.concat(groups[i].keys);into.items=into.items.concat(groups[i].items);}
    groups.splice(i,1);
  }
  groups.forEach(g=>{
    if(g.keys.length===1)g.label=CATS[g.keys[0]].l;
    else if(g.keys.length===2)g.label=g.keys.map(k=>CATS[k].s).join(' · ');
    else g.label=groups.length===1?'':fallback;
  });
  return groups;
}

// short area label for the U-6 chip — strips the parenthetical district from neighborhood.
function areaOf(p){return p.neighborhood?p.neighborhood.replace(/\s*\(.*?\)\s*/g,' ').trim():'';}
function stars(n){
  const tip=n>=3?TIP.t3:(n===2?TIP.t2:TIP.t1);
  let s='<span class="stars has-tip" data-tip="'+tip+'" aria-label="'+n+' of 3">';
  for(let i=1;i<=3;i++)s+='<svg class="ic'+(i<=n?'':' off')+'"><use href="#i-star"/></svg>';
  return s+'</span>';
}
function tagHTML(k){
  const t=TAG[k];if(!t)return'';
  const tip=t.cool?TIP.cool:'';
  return '<span class="tag'+(t.cool?' cool':'')+(tip?' has-tip':'')+'"'+(tip?' data-tip="'+tip+'"':'')+'>'+icon(t.i)+' '+t.l+'</span>';
}
function frHTML(){return '<span class="tag fr has-tip" data-tip="'+TIP.fr+'">'+icon('i-star')+' friend rec</span>';}
function ptHTML(p){return p.pt?'<span class="pt has-tip" data-tip="'+TIP.pt+'">'+'€'.repeat(p.pt)+'</span>':'';}
function dataAttrs(p){
  return ' data-id="'+(p.id||'')+'" data-tier="'+(p.t||0)+'" data-when="'+(p.when||'any')+'" data-tags="'+((p.tags||[]).join(' ')+(p.fr?' fr':'')).trim()+'"';
}

/* ===== index rows (11.6 — list rows are a pure index; prose on card page) */
function row(s,p){
  const cool=(p.tags||[]).some(t=>TAG[t]&&TAG[t].cool);
  const pin=p.map_link?'<a class="rpin" href="'+p.map_link+'" target="_blank" rel="noopener" aria-label="Open '+esc(p.nm)+' in Google Maps">'+icon('i-pin')+'</a>':'';
  const area=areaOf(p);
  return '<div class="card row" role="link" tabindex="0" data-href="#/'+s.id+'/'+slugOf(p,s)+'"'+dataAttrs(p)+'>'+
    '<span class="state-ic"></span>'+
    '<span class="rnm">'+p.nm+'</span>'+
    (cool?'<span class="rdot cool has-tip" data-tip="'+TIP.cool+'">'+icon('i-tree')+'</span>':'')+
    (p.fr?'<span class="rdot fr has-tip" data-tip="'+TIP.fr+'">'+icon('i-star')+'</span>':'')+
    stars(p.t)+ptHTML(p)+
    (area?'<span class="areachip">'+icon('i-pin')+' '+area+'</span>':'')+
    pin+'</div>';
}
function avoidRow(s,p){
  const pin=p.map_link?'<a class="rpin" href="'+p.map_link+'" target="_blank" rel="noopener" aria-label="Open in Google Maps">'+icon('i-pin')+'</a>':'';
  return '<div class="card row avoid" role="link" tabindex="0" data-href="#/'+s.id+'/avoid-'+kebab(p.nm)+'">'+
    '<span class="rnm">'+p.nm+'</span>'+
    '<span class="badge-avoid has-tip" data-tip="'+TIP.avoid+'">'+icon('i-alert')+' AVOID</span>'+pin+'</div>';
}

function sectionFix(title,iconId,bodyHTML,open,count,secKey,cls){
  let lead='<svg class="ic lead"><use href="#'+iconId+'"/></svg>';
  let chev='<svg class="ic chev"><use href="#i-chev"/></svg>';
  return '<details'+(open?' open':'')+(secKey?' data-sec="'+secKey+'"':'')+(cls?' class="'+cls+'"':'')+'><summary>'+lead+'<span>'+title+'</span>'+(count?' <span class="cnt">· '+count+'</span>':'')+chev+'</summary><div class="sec-body">'+bodyHTML+'</div></details>';
}
function groupsHTML(s,groups){
  return groups.map(g=>'<div class="subgrp">'+
    (g.label?'<div class="subhead">'+g.label+'</div>':'')+
    '<div class="cards">'+g.items.map(p=>row(s,p)).join('')+'</div></div>').join('');
}

const AVOID_REF={};

function findPlace(sid,slug){
  const s=TRIP.find(x=>x.id===sid); if(!s)return null;
  if(slug.indexOf('avoid-')===0){
    const nm=slug.slice(6);
    const p=(s.avoid||[]).find(x=>kebab(x.nm)===nm);
    return p?{s,p,avoid:true}:null;
  }
  const p=allCards(s).find(x=>slugOf(x,s)===slug);
  return p?{s,p}:null;
}
const WORK_FIELDS=[['wifi','Wi-Fi'],['power','Outlets'],['laptop','Laptops'],['noise','Noise'],['longstay','Long stay']];
function workMetaHTML(p){
  if(!inCat(p,'work'))return'';

    return '<div class="wrow"><span class="wk">'+l+'</span><span class="wv'+(v?'':' todo')+'">'+(v?esc(v):'TODO — not yet checked')+'</span></div>';

}
function mapRowHTML(p){

}
function renderCardPage(s,p,isAvoid){

  h+='<div class="tags">'+tags+'</div>';
  if(p.photo)h+='<img class="pgphoto" src="'+p.photo+'" alt="" loading="lazy">';

/* ===== per-stop map view (11.5 — pin list until pin density justifies more) =====

   coordinates every stop sits below the 5-pin threshold, and a near-empty

function mapRowItem(s,p,withCoords){

function renderMapPage(s){

  h+='<p class="hook" style="color:var(--muted)">'+pinned.length+' of '+all.length+' places carry an exact pin so far; the rest open as a name search. Coordinates are selectable — paste them into an offline maps app. Tap a name for its page, the pin for directions.</p>';
  if(pinned.length){
    const by={};pinned.forEach(p=>{const a=areaOf(p)||'Elsewhere';(by[a]=by[a]||[]).push(p);});

function legNeedsConfirm(l){return !!(l.hard||/\bconfirm\b|check connections|may exist/i.test(l.ds||''));}

function renderTransit(){

// D11 / U-1 — derive verify + action items from EXISTING copy only (mechanical keyword scan).
function firstClause(s){s=(s||'').trim();const m=s.match(/^[^.;—]+/);return m?m[0].trim():s;}
function buildChecklist(){
  const verify=[], action=[];
  const actRe=/\b(book|buy|confirm|download|reserve|pre-?book|pre-?purchase)\b/i;
  const verRe=/€|closed|opening|\bhours\b|\bsunday\b|\bmonday\b|timetable|schedule|seasonal/i;
  LEGS.forEach(l=>{ if(legNeedsConfirm(l)) verify.push({id:'leg:'+kebab(l.ttl), txt:'Confirm '+l.ttl+(l.spec?' ('+l.spec+')':''), grp:'Transport'}); });
  TRIP.forEach(s=>{
    allCards(s).forEach(p=>{
      const txtsrc=(p.hook||'')+' '+(p.facts||[]).map(f=>f[1]).join(' ');
      if(actRe.test(txtsrc)) action.push({id:'act:'+p.id, txt:p.nm+' — '+firstClause(p.hook), grp:s.name});
      if(verRe.test(txtsrc)) verify.push({id:'ver:'+p.id, txt:p.nm+' — verify hours / price', grp:s.name});
    });
  });
  return {verify,action};
}
function clGroups(items){
  if(!items.length)return '<p class="cl-empty">Nothing flagged here.</p>';
  const by={}; items.forEach(it=>{(by[it.grp]=by[it.grp]||[]).push(it);});
  return Object.keys(by).map(g=>'<div class="cl-group"><h3>'+g+'</h3>'+
    by[g].map(it=>'<div class="cl-item" data-vid="'+it.id+'"><span class="box">'+icon('i-check')+'</span><span class="cl-txt">'+it.txt+'</span></div>').join('')+'</div>').join('');
}
function renderChecklist(){
  const {verify,action}=buildChecklist();
  return '<div class="stop"><div class="stop-head"><h2>Pre-trip checklist</h2></div>'+
    '<p class="hook" style="color:var(--muted);margin:12px 0 0">Tap an item to tick it off — saved on this phone. <b>Verify</b> = facts that drift (hours, prices, bus times). <b>Actions</b> = things to book or buy before you go.</p>'+
    '<div class="cl-tabs"><button class="cl-tab" type="button" data-cl="verify" aria-pressed="true">Verify · '+verify.length+'</button>'+
    '<button class="cl-tab" type="button" data-cl="action" aria-pressed="false">Actions · '+action.length+'</button></div>'+
    '<div class="cl-panel" id="cl-verify">'+clGroups(verify)+'</div>'+
    '<div class="cl-panel" id="cl-action" hidden>'+clGroups(action)+'</div></div>';
}

function closeMenu(){tnMenu.hidden=true;tnMore.setAttribute('aria-expanded','false');}
tnMore.addEventListener('click',()=>{const open=tnMenu.hidden;tnMenu.hidden=!open;tnMore.setAttribute('aria-expanded',open?'true':'false');});
tnMenu.addEventListener('click',e=>{if(e.target.closest('a'))closeMenu();});

/* ===== decision state (want · done · skip) ===== */
function applyPlace(c){
  const id=c.getAttribute('data-id'); if(!id)return;
  const st=places[id]||{};
  c.classList.toggle('is-want',!!st.w);
  c.classList.toggle('is-done',!!st.d);
  c.classList.toggle('is-skip',!st.d&&!!st.s);   // done wins over skip for display
  const si=c.querySelector('.state-ic'); if(si)si.innerHTML=st.d?icon('i-check'):(st.s?'✕':'');
  const w=c.querySelector('.act.want'), d=c.querySelector('.act.done'), s=c.querySelector('.act.skip');
  if(w)w.setAttribute('aria-pressed',st.w?'true':'false');
  if(d)d.setAttribute('aria-pressed',st.d?'true':'false');
  if(s)s.setAttribute('aria-pressed',st.s?'true':'false');
}
function applyPlaceAll(id){
  document.querySelectorAll('.card[data-id="'+id+'"],.pagecard[data-id="'+id+'"]').forEach(applyPlace);
}
// §10.1 + U-11 — sink done/skip to the bottom of their group; lift wants to the top.
function reflow(scope){
  (scope||document).querySelectorAll('.cards').forEach(body=>{
    const cards=[...body.querySelectorAll(':scope > .card')];
    if(cards.length<2)return;
    const rank=c=>{const st=places[c.getAttribute('data-id')]||{};if(st.d||st.s)return 2;if(st.w)return 0;return 1;};
    cards.map((c,i)=>[c,rank(c),i]).sort((a,b)=>a[1]-b[1]||a[2]-b[2]).forEach(x=>body.appendChild(x[0]));
  });
}
function applyVerified(){
  document.querySelectorAll('[data-vid]').forEach(el=>{
    const on=!!verified[el.getAttribute('data-vid')];
    if(el.classList.contains('verify'))el.setAttribute('aria-pressed',on?'true':'false');
    else el.classList.toggle('done',on);
  });
}
function applyBooked(){
  document.querySelectorAll('.bookbtn[data-book]').forEach(b=>{
    const on=!!booked[b.getAttribute('data-book')];
    b.setAttribute('aria-pressed',on?'true':'false');
    b.innerHTML=on?icon('i-check')+' Booked':icon('i-bed')+' Mark booked';
    const det=b.closest('details'); if(det)det.classList.toggle('booked',on);
  });
}
function jumpTo(pid){
  const view=document.querySelector('.view.active'); if(!view)return;
  const card=view.querySelector('.card[data-id="'+pid+'"]'); if(!card)return;
  const det=card.closest('details'); if(det&&!det.open){modeDriving=true;det.open=true;modeDriving=false;}
  card.classList.add('flash'); setTimeout(()=>card.classList.remove('flash'),1500);
  if(card.scrollIntoView)card.scrollIntoView({block:'center'});
}
function applyTheme(t){
  const r=document.documentElement; r.classList.remove('theme-light','theme-dark');
  if(t==='light')r.classList.add('theme-light'); else if(t==='dark')r.classList.add('theme-dark');
  const lab=document.getElementById('themeLab'); if(lab)lab.textContent=t||'auto';
}
function cycleTheme(){const cur=LS.get('theme','auto');const n=cur==='auto'?'light':(cur==='light'?'dark':'auto');LS.set('theme',n);applyTheme(n);}
function doExport(){
  let lines=['Balkans Overland South — my picks',''];
  TRIP.forEach(s=>{
    const picks=allCards(s).map(p=>({p,st:places[p.id]||{}})).filter(x=>x.st.w||x.st.d);
    if(!picks.length)return;
    lines.push('## '+s.name+' · '+s.when);
    const noteLine=p=>{const n=notes[p.id];if(n)lines.push('     · '+n);};
    picks.filter(x=>x.st.w&&!x.st.d).forEach(x=>{lines.push('  ☆ '+x.p.nm+(x.p.neighborhood?' — '+x.p.neighborhood:''));noteLine(x.p);});
    picks.filter(x=>x.st.d).forEach(x=>{lines.push('  ✓ '+x.p.nm+(x.p.neighborhood?' — '+x.p.neighborhood:''));noteLine(x.p);});
    lines.push('');
  });
  if(lines.length<=2)lines.push('(No saved or done places yet — tap Save / Done on a place page.)');
  const text=lines.join('\n');
  try{if(navigator.clipboard)navigator.clipboard.writeText(text);}catch(_){}
  try{const blob=new Blob([text],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='balkans-picks.txt';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}catch(_){}
  showOff('✓ picks copied + downloaded');
}
app.addEventListener('click',e=>{
  // want / done / skip (rows have no toggles; card pages do)
  const btn=e.target.closest('.act');
  if(btn){
    e.preventDefault();
    const c=btn.closest('.card,.pagecard'); if(!c)return;
    const id=c.getAttribute('data-id'); if(!id)return;
    const st=places[id]||{}, act=btn.getAttribute('data-act');
    if(act==='want')st.w=st.w?0:1;
    else if(act==='done'){st.d=st.d?0:1; if(st.d)st.s=0;}
    else if(act==='skip'){st.s=st.s?0:1; if(st.s)st.d=0;}
    if(!st.w&&!st.d&&!st.s)delete places[id]; else places[id]=st;
    LS.set('places',places);
    applyPlaceAll(id);
    const av=document.querySelector('.view.active');
    if(av&&av.classList.contains('stopview')){reflow(av);applyFilters();}
    return;
  }
  // top-3 jump
  const jump=e.target.closest('[data-jump]');
  if(jump){e.preventDefault();jumpTo(jump.getAttribute('data-jump'));return;}
  // verify badge (legs) + checklist item — shared verified[]
  const vEl=e.target.closest('.verify,.cl-item');
  if(vEl){const vid=vEl.getAttribute('data-vid');if(vid){if(verified[vid])delete verified[vid];else verified[vid]=1;LS.set('verified',verified);applyVerified();}return;}
  // tap-to-copy base area
  const cp=e.target.closest('.copybtn[data-copy]');
  if(cp){const txt=cp.getAttribute('data-copy')||'';try{if(navigator.clipboard)navigator.clipboard.writeText(txt);}catch(_){}cp.innerHTML=icon('i-check')+' Copied';setTimeout(()=>{cp.innerHTML=icon('i-pin')+' Copy base area';},1600);return;}
  // booked toggle
  const bk=e.target.closest('.bookbtn');
  if(bk){const sid=bk.getAttribute('data-book');if(booked[sid])delete booked[sid];else booked[sid]=1;LS.set('booked',booked);applyBooked();return;}
  // checklist tabs
  const tab=e.target.closest('.cl-tab');
  if(tab){const which=tab.getAttribute('data-cl'),view=tab.closest('.view');view.querySelectorAll('.cl-tab').forEach(t=>t.setAttribute('aria-pressed',t===tab?'true':'false'));view.querySelector('#cl-verify').hidden=which!=='verify';view.querySelector('#cl-action').hidden=which!=='action';return;}
  // theme + export
  if(e.target.closest('#btnTheme')){cycleTheme();return;}
  if(e.target.closest('#btnExport')){doExport();return;}
  // index row → its card page (11.6); pin link and badge tooltips stay independent
  const rowEl=e.target.closest('.card.row[data-href]');
  if(rowEl&&!e.target.closest('a')&&!e.target.closest('.has-tip')){
    location.hash=rowEl.getAttribute('data-href');
  }
});
app.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const r=e.target.closest('.card.row[data-href]');
  if(r){e.preventDefault();location.hash=r.getAttribute('data-href');}
});
// 11.6 — per-card note field (debounced persist)
let noteT;
app.addEventListener('input',e=>{
  const nf=e.target.closest('.notefield'); if(!nf)return;
  clearTimeout(noteT);
  noteT=setTimeout(()=>{
    const id=nf.getAttribute('data-note'), v=nf.value.trim();

/* --- section open/closed memory (semantic data-sec keys, both levels) --- */
const secState=LS.get('sections',{});      // { 'stopid:sec': bool }
let modeDriving=false;                       // true while a mode preset drives section state (don't persist those)
document.querySelectorAll('.stopview').forEach(view=>{
  const sid=view.getAttribute('data-stop');
  view.querySelectorAll('details[data-sec]').forEach(d=>{
    const k=sid+':'+d.getAttribute('data-sec'); d.setAttribute('data-sk',k);
    if(k in secState)d.open=secState[k];
    d.addEventListener('toggle',()=>{if(modeDriving)return;secState[k]=d.open;LS.set('sections',secState);});
  });
});

/* --- tag / tier / time (+ saved / hide-done) filters, scoped to the active stop view --- */
const F={tags:new Set(),tier:0,wantOnly:false,hideDone:false,when:new Set()};
let modeCool=false;   // set true by Heat mode — restrict Activities rows to heat-relief
function isCool(ctags){return ctags.some(t=>TAG[t]&&TAG[t].cool);}
function applyFilters(){
  const scope=document.querySelector('.view.active');
  if(!scope||!scope.classList.contains('stopview'))return;
  scope.querySelectorAll('.card:not(.avoid)').forEach(c=>{
    const tier=+(c.getAttribute('data-tier')||0);
    const ctags=(c.getAttribute('data-tags')||'').split(' ').filter(Boolean);
    const cw=c.getAttribute('data-when')||'any';
    const st=places[c.getAttribute('data-id')]||{};
    let show=true;
    if(F.tier&&tier<F.tier)show=false;
    if(show&&F.tags.size)show=[...F.tags].some(t=>ctags.includes(t));
    if(show&&F.when.size)show=(cw==='any'||F.when.has(cw));
    if(show&&F.wantOnly&&!st.w)show=false;
    if(show&&F.hideDone&&st.d)show=false;
    if(show&&modeCool&&c.closest('details[data-sec="acts"]'))show=isCool(ctags);
    c.classList.toggle('filtered',!show);
  });
  scope.querySelectorAll('.subgrp').forEach(sg=>{
    const cards=sg.querySelectorAll('.card:not(.avoid)');
    if(cards.length)sg.classList.toggle('empty',![...cards].some(c=>!c.classList.contains('filtered')));
  });
  scope.querySelectorAll('details[data-sec]').forEach(d=>{
    const cards=d.querySelectorAll('.card:not(.avoid)');
    if(cards.length)d.classList.toggle('empty',![...cards].some(c=>!c.classList.contains('filtered')));
  });
}
(function buildFilterBar(){
  const present=new Set();
  TRIP.forEach(s=>allCards(s).forEach(p=>{(p.tags||[]).forEach(t=>present.add(t));if(p.fr)present.add('fr');}));
  const tagOrder=Object.keys(TAG).filter(k=>present.has(k));
  const tierChips=[['All',0],['★★+',2],['★★★',3]].map(([l,v])=>
    '<button class="chip tier" type="button" data-tier="'+v+'" aria-pressed="'+(v===0?'true':'false')+'">'+l+'</button>').join('');
  let tagChips=tagOrder.map(k=>'<button class="chip tag" type="button" data-tag="'+k+'" aria-pressed="false">'+icon(TAG[k].i)+' '+TAG[k].l+'</button>').join('');
  if(present.has('fr'))tagChips+='<button class="chip tag" type="button" data-tag="fr" aria-pressed="false">'+icon('i-star')+' friend rec</button>';
  const bar=document.getElementById('filterbar');
  bar.innerHTML=
    '<span class="flabel">Rank</span><div class="fgroup tiers">'+tierChips+'</div>'+
    '<span class="fsep"></span>'+
    '<span class="flabel">Time</span><div class="fgroup whens">'+
      '<button class="chip when" type="button" data-when="morning" aria-pressed="false">'+icon('i-sun')+' Morning</button>'+
      '<button class="chip when" type="button" data-when="evening" aria-pressed="false">'+icon('i-music')+' Evening</button>'+
    '</div>'+
    '<span class="fsep"></span>'+
    '<span class="flabel">Type</span><div class="fgroup tags">'+tagChips+'</div>'+
    '<span class="fsep"></span>'+
    '<button class="chip" type="button" id="fWant" aria-pressed="false">'+icon('i-bookmark')+' Saved</button>'+
    '<button class="chip" type="button" id="fHideDone" aria-pressed="false">'+icon('i-check')+' Hide done</button>'+
    '<button class="fclear" type="button">Clear</button>';
  bar.addEventListener('click',e=>{
    const t=e.target.closest('.chip,.fclear'); if(!t)return;
    if(t.classList.contains('fclear')){
      F.tags.clear();F.tier=0;F.wantOnly=false;F.hideDone=false;F.when.clear();
      bar.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed','false'));
      bar.querySelector('.chip.tier[data-tier="0"]').setAttribute('aria-pressed','true');
    }else if(t.classList.contains('tier')){
      F.tier=+t.getAttribute('data-tier');
      bar.querySelectorAll('.chip.tier').forEach(c=>c.setAttribute('aria-pressed',c===t?'true':'false'));
    }else if(t.classList.contains('when')){
      const wv=t.getAttribute('data-when'), on=t.getAttribute('aria-pressed')==='true';
      t.setAttribute('aria-pressed',on?'false':'true');
      on?F.when.delete(wv):F.when.add(wv);
    }else if(t.classList.contains('tag')){
      const tag=t.getAttribute('data-tag'), on=t.getAttribute('aria-pressed')==='true';
      t.setAttribute('aria-pressed',on?'false':'true');
      on?F.tags.delete(tag):F.tags.add(tag);
    }else if(t.id==='fWant'){F.wantOnly=t.getAttribute('aria-pressed')!=='true';t.setAttribute('aria-pressed',F.wantOnly?'true':'false');}
    else if(t.id==='fHideDone'){F.hideDone=t.getAttribute('aria-pressed')!=='true';t.setAttribute('aria-pressed',F.hideDone?'true':'false');}
    applyFilters();
  });
})();
document.getElementById('filterToggle').addEventListener('click',function(){
  const bar=document.getElementById('filterbar'), show=bar.hasAttribute('hidden');
  show?bar.removeAttribute('hidden'):bar.setAttribute('hidden','');
  this.setAttribute('aria-pressed',show?'true':'false');
});

/* --- expand / collapse all (active view, persists section memory) --- */
function setAll(open){
  const scope=document.querySelector('.view.active'); if(!scope)return;
  scope.querySelectorAll('details[data-sec]').forEach(d=>{
    d.open=open;const k=d.getAttribute('data-sk');if(k)secState[k]=open;
  });
  LS.set('sections',secState);
}
document.getElementById('expandAll').onclick=()=>setAll(true);
document.getElementById('collapseAll').onclick=()=>setAll(false);

/* ===== modes — view-configs over the v4 taxonomy (§9, P1-1, U-3/U-8) =====
   Section keys: acts food work info + nested avoid around timing util stay. */
const MODES={
  explore:{lab:'Explore',ic:'i-view'},
  heat:{lab:'It’s brutal out',ic:'i-temp',cls:'heat',cool:true,open:['acts'],hide:['food','work']},
  arrival:{lab:'Arrival',ic:'i-bed',open:['info','util','stay','around','food'],hide:['acts']},
  evening:{lab:'Evening',ic:'i-music',open:['food','acts'],hide:['work']},
  travel:{lab:'Travel day',ic:'i-bus',open:['info','around'],hide:['acts','food','work'],banner:true}
};
let MODE_KEY='explore';
function setMode(k){
  if(!MODES[k])k='explore';
  MODE_KEY=k; modeCool=!!MODES[k].cool;
  document.querySelectorAll('#modebar .modechip').forEach(c=>c.setAttribute('aria-pressed',c.getAttribute('data-mode')===k?'true':'false'));
  applyMode();
  applyFilters();
}
function applyMode(){
  const view=document.querySelector('.view.active'); if(!view||!view.classList.contains('stopview'))return;
  const m=MODES[MODE_KEY];
  modeDriving=true;
  view.querySelectorAll('details[data-sec]').forEach(d=>{
    const sec=d.getAttribute('data-sec');
    d.classList.toggle('mode-hidden',!!(m.hide&&m.hide.indexOf(sec)>=0));
    if(MODE_KEY==='explore'){const k=d.getAttribute('data-sk'); d.open=(k in secState)?secState[k]:(sec==='acts');}
    else d.open=!!(m.open&&m.open.indexOf(sec)>=0);
  });
  modeDriving=false;
  let banner=view.querySelector('.mode-banner');
  if(m.banner){
    if(!banner){banner=document.createElement('div');banner.className='mode-banner';
      banner.innerHTML=icon('i-bus')+'<div>It’s a travel day — open <a href="#/transit">Getting between stops</a> for the leg checklists.</div>';
      const firstD=view.querySelector('.stop > details'); firstD.parentNode.insertBefore(banner,firstD);}
  }else if(banner)banner.remove();
}
(function buildModeBar(){
  const bar=document.getElementById('modebar');
  bar.innerHTML=Object.keys(MODES).map(k=>{const m=MODES[k];
    return '<button class="modechip'+(m.cls?' '+m.cls:'')+'" type="button" data-mode="'+k+'" aria-pressed="'+(k==='explore'?'true':'false')+'">'+icon(m.ic)+' '+m.lab+'</button>';}).join('');
  bar.addEventListener('click',e=>{const b=e.target.closest('.modechip'); if(b)setMode(b.getAttribute('data-mode'));});
})();

/* --- self-labeling badge tooltips (U-7) --- */
document.addEventListener('click',e=>{
  const existing=document.querySelector('.tip-pop');
  const tipEl=e.target.closest('.has-tip');
  if(existing&&(!tipEl||existing.parentNode!==tipEl))existing.remove();
  if(tipEl&&!tipEl.querySelector('.tip-pop')){

    tipEl.appendChild(pop);

});

/* --- apply persisted state + initial sort on load --- */
document.querySelectorAll('#app .card[data-id]').forEach(applyPlace);
reflow(document);
applyVerified();

/* --- search (P2-3): client-side, debounced, no library — links to card pages --- */
(function(){
  const si=document.getElementById('search'); if(!si)return;
  const results=document.getElementById('searchResults');
  const INDEX=[];
  TRIP.forEach(s=>allCards(s).forEach(p=>INDEX.push({
    nm:p.nm,stop:s.name,href:'#/'+s.id+'/'+slugOf(p,s),
    hay:((p.nm||'')+' '+(p.hook||'')+' '+(p.tags||[]).join(' ')).toLowerCase()
  })));
  let t;
  si.addEventListener('input',()=>{
    clearTimeout(t);
    t=setTimeout(()=>{
      const q=si.value.trim().toLowerCase();
      if(!q){results.innerHTML='';return;}
      const hits=INDEX.filter(x=>x.hay.indexOf(q)>=0).slice(0,12);
      results.innerHTML=hits.length
        ? hits.map(x=>'<a href="'+x.href+'">'+x.nm+'<span class="sr-stop">'+x.stop+'</span></a>').join('')
        : '<div class="search-empty">No matches.</div>';
    },120);
  });
})();

/* ===== router (top-level routes + #/{stop}/{card-slug} card pages) ===== */
const subbar=document.getElementById('subbar');
function isStop(r){return STOP_IDS.indexOf(r)>=0;}
let curRoute=null;
const scrollMem={};   // stop route → scrollY (11.6 back/scroll guarantee)
function go(route){
  const seg=route.split('/').filter(Boolean);
  let card=null;
  if(seg.length===2){
    if(seg[1]==='map'){const ms=TRIP.find(x=>x.id===seg[0]);card=ms?{s:ms,map:true}:null;}
    else card=findPlace(seg[0],seg[1]);
    if(!card)route='overview';
  }
  if(!card&&ROUTES.indexOf(route)<0)route='overview';
  // leaving a stop list → remember its scroll position
  if(curRoute&&isStop(curRoute))scrollMem[curRoute]=window.scrollY;
  if(card){
    const vc=document.getElementById('view-card');
    vc.innerHTML=card.map?renderMapPage(card.s):renderCardPage(card.s,card.p,card.avoid);
    const pc=vc.querySelector('.pagecard[data-id]'); if(pc)applyPlace(pc);
  }
  document.querySelectorAll('.view').forEach(v=>{
    const on=card?v.id==='view-card':v.id==='view-'+route;
    v.hidden=!on;v.classList.toggle('active',on);
  });
  const baseRoute=card?seg[0]:route;
  document.querySelectorAll('.tn-tab').forEach(a=>a.classList.toggle('active',a.getAttribute('data-route')===baseRoute));
  const stop=!card&&isStop(route);
  subbar.hidden=!stop;
  if(stop)LS.set('route',route);          // default route = last stop visited
  closeMenu();
  if(stop){applyMode();reflow(document.querySelector('.view.active'));applyFilters();}
  // back to a stop list → restore the exact scroll position; everything else → top
  if(stop&&scrollMem[route]!=null)window.scrollTo(0,scrollMem[route]);
  else window.scrollTo(0,0);
  curRoute=card?seg[0]+'/'+seg[1]:route;
}
function parseHash(){
  let h=(location.hash||'').replace(/^#\/?/,'');   // '#/budapest' | '#budapest' | '#/budapest/lumen-cafe'
  if(h==='transport')h='transit';                   // legacy anchor
  if(h==='')h=LS.get('route','overview');           // bare load → last stop, else overview
  return h;
}
window.addEventListener('hashchange',()=>go(parseHash()));
go(parseHash());

/* ===== service worker + offline indicator ============================= */
const offInd=document.getElementById('offInd');
function showOff(txt,sticky){if(!offInd)return;offInd.textContent=txt;offInd.hidden=false;if(!sticky)setTimeout(()=>{offInd.hidden=true;},2600);}
function updOnline(){if(!offInd)return;if(!navigator.onLine)showOff('offline — using saved copy',true);else offInd.hidden=true;}
window.addEventListener('online',updOnline);
window.addEventListener('offline',updOnline);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>{if(navigator.onLine)showOff('✓ saved for offline');})
      .catch(()=>{});
  });
}
updOnline();
